quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:courses;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
quarkus.datasource.username=sa
quarkus.datasource.password=sa

quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=false

jwt.expires-in=3600

mp.jwt.verify.issuer=courses-api
mp.jwt.verify.publickey.location=publicKey.pem

smallrye.jwt.sign.key.location=privateKey.pem
smallrye.jwt.new-token.issuer=courses-api
smallrye.jwt.new-token.signature-algorithm=RS256